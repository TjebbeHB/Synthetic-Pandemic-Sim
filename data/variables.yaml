# Variable catalogue for OneGov #2 Synthetic Data
# Source of truth for the variables a submission can target.
# Human-readable version: ../docs/variables.md
# Mirrors ../resources/SynthData.xlsx as delivered by the challenge owners.
#
# Schema:
#   id          stable slug (lowercase, kebab-case)
#   name        Dutch name as in the spreadsheet
#   priority    must-have | should-have | could-have | would-have
#   category    spatial | demographics | housing | socio-economic | health | land-use | mobility
#   discipline  epi | soc | meta                # epi=infection model, soc=social context, meta=metagenomics/RWZI
#   source      key into sources.yaml
#   table_id    CBS table id or external identifier
#   notes       optional free text

